name: Test Project


on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]


jobs: 
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postregs:16
        env:
          POSTGRES_USER: root
          POSTGRES_PASSWORD: 123
          POSTGRES_DB: jobboard
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest
      
